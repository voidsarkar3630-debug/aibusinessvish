<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Business Vish - Dashboard</title>
    <style>
        /* --- Global Styles & Neon Gradient Background --- */
        body {
            background: linear-gradient(135deg, #060b19 0%, #0a1931 50%, #15305b 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* --- Header & Title --- */
        h1 {
            font-size: 2.2rem;
            text-shadow: 0 0 15px rgba(0, 149, 255, 0.6);
            margin-bottom: 5px;
            color: #00d2ff;
        }
        
        h2.page-title {
            font-size: 1.5rem;
            color: #a5b4fc;
            margin-top: 0;
            margin-bottom: 25px;
        }

        /* --- Navigation Bar --- */
        nav {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            background: rgba(0, 210, 255, 0.2);
            color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.4);
        }

        .logout-btn {
            margin-left: auto;
            background: #ef4444;
            border: none;
            color: white;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #dc2626;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        /* --- Dashboard Grid & Cards --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 16px;
            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 210, 255, 0.4);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.15);
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card .number {
            font-size: 2rem;
            font-weight: bold;
            margin: 0;
            color: #00d2ff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        /* --- Table Section --- */
        .table-section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 16px;
        }

        .table-section h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #ffffff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 12px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            color: #a5b4fc;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
        }

        tr:hover td {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.02);
        }
    </style>
</head>
<body>

    <h1>AI BUSINESS VISH</h1>
    
    <nav>
        <a href="#">🏠 Dashboard</a>
        <a href="#">👥 Users</a>
        <a href="#">📩 Leads</a>
        <a href="#">💼 Projects</a>
        <a href="#">⚙ Settings</a>
        <button class="logout-btn">Logout</button>
    </nav>

    <h2 class="page-title">Dashboard</h2>

    <div class="stats-grid">
        <div class="card">
            <h3>Total Leads</h3>
            <div class="number">0</div>
        </div>
        <div class="card">
            <h3>Total Users</h3>
            <div class="number">0</div>
        </div>
        <div class="card">
            <h3>Projects</h3>
            <div class="number">12</div>
        </div>
        <div class="card">
            <h3>Revenue</h3>
            <div class="number">₹52,000</div>
        </div>
    </div>

    <div class="table-section">
        <h3>Recent Leads</h3>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>-</td>
                    <td>-</td>
                    <td>-</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
