<body>

<div class="sidebar">
    <h2>AI BUSINESS VISH</h2>

    <a href="#">🏠 Dashboard</a>
    <a href="#">👥 Users</a>
    <a href="#">📩 Leads</a>
    <a href="#">💼 Projects</a>
    <a href="#">⚙ Settings</a>

    <button id="logoutBtn">Logout</button>
</div>

<div class="main">

    <div class="topbar">
        <h1>Dashboard</h1>
        <div class="profile">
            <span id="userEmail"></span>
        </div>
    </div>

    <div class="cards">

        <div class="card">
            <h3>Total Leads</h3>
            <h2 id="leadCount">0</h2>
        </div>

        <div class="card">
            <h3>Total Users</h3>
            <h2 id="userCount">0</h2>
        </div>

        <div class="card">
            <h3>Projects</h3>
            <h2>12</h2>
        </div>

        <div class="card">
            <h3>Revenue</h3>
            <h2>₹52,000</h2>
        </div>

    </div>

    <div class="table-box">
        <h2>Recent Leads</h2>

        <table>

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="leadTable">
            </tbody>

        </table>

    </div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
