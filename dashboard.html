<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI BUSINESS VISH Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

.sidebar{
width:260px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
padding:30px;
display:flex;
flex-direction:column;
gap:15px;
border-right:1px solid rgba(255,255,255,.1);
}

.sidebar h2{
color:#38bdf8;
margin-bottom:20px;
}

.sidebar a{
color:white;
text-decoration:none;
padding:12px;
border-radius:10px;
transition:.3s;
}

.sidebar a:hover{
background:rgba(56,189,248,.15);
}

.sidebar button{
margin-top:auto;
padding:14px;
border:none;
border-radius:12px;
background:#38bdf8;
font-weight:bold;
cursor:pointer;
}

.main{
flex:1;
padding:35px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.profile{
background:rgba(255,255,255,.08);
padding:10px 20px;
border-radius:12px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(56,189,248,.15);
}

.card h3{
color:#cbd5e1;
margin-bottom:10px;
}

.card h2{
font-size:32px;
color:#38bdf8;
}

.table-box{
margin-top:35px;
background:rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,.1);
text-align:left;
}

@media(max-width:900px){
body{
flex-direction:column;
}

.sidebar{
width:100%;
border-right:none;
border-bottom:1px solid rgba(255,255,255,.1);
}
}
</style>

</head>

<body>

<div class="sidebar">

<h2>🚀 AI BUSINESS VISH</h2>

<a href="#">🏠 Dashboard</a> <a href="#">📁 My Projects</a> <a href="#">👤 Profile</a>

<button id="logoutBtn">Logout</button>

</div>

<div class="main">

<div class="topbar">

<h1>User Dashboard</h1>

<div class="profile">
<span id="userEmail">Loading...</span>
</div>

</div>

<div class="cards">

<div class="card">
<h3>Total Projects</h3>
<h2 id="projectCount">0</h2>
</div>

<div class="card">
<h3>Total Spent</h3>
<h2 id="totalSpent">₹0</h2>
</div>

</div>

<div class="table-box">

<h2>My Projects</h2>

<table>

<thead>
<tr>
<th>Project Name</th>
<th>Price</th>
<th>Status</th>
</tr>
</thead>

<tbody id="projectTable">
</tbody>

</table>

</div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
