<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard - AI BUSINESS VISH</title>

<link rel="stylesheet" href="css/style.css">

<style>

.dashboard{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#001233,#003566,#0077b6);
}

.card{
width:500px;
padding:40px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border-radius:25px;
text-align:center;
box-shadow:0 0 40px rgba(0,180,255,.3);
color:white;
}

.card h1{
margin-bottom:20px;
}

.info{
margin:15px 0;
font-size:18px;
}

.logout{
margin-top:25px;
padding:12px 25px;
border:none;
border-radius:12px;
cursor:pointer;
background:#00c6ff;
font-weight:bold;
}

</style>

</head>

<body>

<div class="dashboard">

<div class="card">

<h1>Welcome</h1>

<div class="info">
Name: <span id="name"></span>
</div>

<div class="info">
Email: <span id="email"></span>
</div>

<div class="info">
UID: <span id="uid"></span>
</div>

<button id="logoutBtn" class="logout">
Logout
</button>

</div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
